options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: prepmind-ai
  _AR_REPOSITORY: prepmind-ai
  _UPLOAD_BUCKET: prepmind-ai-uploads
  _INSTANCE_CONNECTION_NAME: your-project:us-central1:prepmind-ai-db
  _DATABASE_URL: postgresql+psycopg://prepmind_user:change-me@/prepmind?host=/cloudsql/your-project:us-central1:prepmind-ai-db
  _SESSION_SECRET_NAME: prepmind-session-secret

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud run deploy "${_SERVICE_NAME}" \
          --image "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA" \
          --region "${_REGION}" \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --execution-environment gen2 \
          --add-cloudsql-instances "${_INSTANCE_CONNECTION_NAME}" \
          --add-volume "name=prepmind-uploads,type=cloud-storage,bucket=${_UPLOAD_BUCKET}" \
          --add-volume-mount "volume=prepmind-uploads,mount-path=/mnt/uploads" \
          --set-env-vars "PREPMIND_ENV=production,PREPMIND_DATABASE_URL=${_DATABASE_URL},PREPMIND_UPLOAD_DIR=/mnt/uploads,PREPMIND_SESSION_HTTPS_ONLY=true" \
          --set-secrets "PREPMIND_SESSION_SECRET=${_SESSION_SECRET_NAME}:latest"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_SERVICE_NAME}:latest
